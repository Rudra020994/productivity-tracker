<!DOCTYPE html>
<html>
<head>
    <title>Productivity Tracker</title>
    <style>
        body { font-family: Arial; margin: 40px; max-width: 600px; }
        input, textarea, button { width: 100%; margin-bottom: 12px; padding: 8px; }
        button { background: #007bff; color: white; border: none; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
<h2>Add Daily Activity</h2>
<form action="/add" method="POST">
    <input name="name" placeholder="Name" required>
    <input name="module" placeholder="Work Module" required>
    <textarea name="description" placeholder="Work Description"></textarea>
    <input type="date" name="date" required>
    <label>Start Time:</label><input type="time" name="start_time" required>
    <label>End Time:</label><input type="time" name="end_time" required>
    <button type="submit">Save Activity</button>
</form>

<a href="/report">View Report</a>
</body>
</html>
